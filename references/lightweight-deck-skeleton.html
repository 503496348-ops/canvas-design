<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>DECK_TITLE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;top:50%;left:50%;transform-origin:center center;width:1920px;height:1080px}
.slide{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.slide.active{display:flex}
/* Palette — swap :root vars for theme */
.navy{background:#1a1a2e;color:#e8e4dc}
.cream{background:#f8f7f4;color:#1a1a2e}
.gold{color:#c9a96e}
/* Typography — system fonts, zero CDN */
.t-hero{font-family:Georgia,'Noto Serif SC',serif;font-size:88px;font-weight:700;line-height:1.08;letter-spacing:-1px}
.t-h1{font-family:Georgia,'Noto Serif SC',serif;font-size:56px;font-weight:700;line-height:1.15}
.t-h2{font-family:Georgia,'Noto Serif SC',serif;font-size:40px;font-weight:600;line-height:1.2}
.t-h3{font-family:Georgia,'Noto Serif SC',serif;font-size:28px;font-weight:600;line-height:1.3}
.t-lead{font-size:22px;line-height:1.7;opacity:.85}
.t-body{font-size:18px;line-height:1.75;opacity:.8}
.t-small{font-size:15px;line-height:1.6;opacity:.6}
.t-kicker{font-family:'Courier New',monospace;font-size:13px;letter-spacing:4px;text-transform:uppercase;opacity:.55}
.t-label{font-family:'Courier New',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:.5}
/* Layout */
.pad{padding:80px 120px}
.chrome-top{display:flex;justify-content:space-between;align-items:center;padding:40px 120px 0;font-family:'Courier New',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:.5}
.chrome-bot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;padding:0 120px 40px;font-family:'Courier New',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:.4}
.rule{width:40px;height:1px;background:#c9a96e}
.rule-full{width:100%;height:1px;background:currentColor;opacity:.15}
.split{display:grid;grid-template-columns:1fr 1fr;gap:80px;flex:1;align-items:center}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:40px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:30px}
.grid6{display:grid;grid-template-columns:repeat(3,1fr);gap:30px 50px}
.vdiv{width:1px;background:currentColor;opacity:.12}
/* Bullet */
.bl::before{content:'—';font-family:'Courier New',monospace;color:#c9a96e;margin-right:12px;opacity:.7}
/* Nav */
#nav{position:fixed;right:40px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:10px}
#nav button{width:10px;height:10px;border-radius:50%;border:none;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s;padding:0}
#nav button.on{background:#c9a96e;transform:scale(1.4)}
/* Components */
.sc{padding-top:20px;border-top:1px solid rgba(232,228,220,.2)}
.sc .num{font-family:Georgia,serif;font-size:72px;font-weight:700;line-height:.9;color:#c9a96e}
.sc .ttl{font-size:18px;font-weight:600;margin-top:12px}
.sc .desc{font-size:15px;opacity:.6;margin-top:8px;line-height:1.5}
.ps{padding-top:20px;border-top:1px solid rgba(232,228,220,.2)}
.ps .n{font-family:Georgia,serif;font-size:18px;font-style:italic;opacity:.4;margin-bottom:8px}
.ps .t{font-size:20px;font-weight:600;margin-bottom:6px}
.ps .d{font-size:15px;opacity:.6;line-height:1.5}
.fi{text-align:center}
.fi .n{font-family:Georgia,serif;font-size:48px;font-weight:700;opacity:.15;line-height:1}
.fi .t{font-size:20px;font-weight:600;margin-top:8px}
.fi .l{font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:.4;margin-top:4px;font-family:'Courier New',monospace}
</style>
</head>
<body>
<div id="stage">

<!-- SLIDE TEMPLATE (copy & modify):
<div class="slide navy active">  ← first slide needs "active"
  <div class="chrome-top"><span>LABEL</span><span>NN / TOTAL</span></div>
  <div style="padding:80px 120px;display:flex;flex-direction:column;justify-content:center;flex:1">
    <div class="t-kicker">KICKER TEXT</div>
    <div class="rule" style="margin:16px 0"></div>
    <div class="t-h1">HEADLINE</div>
    <div class="t-body" style="margin-top:30px">Body text here.</div>
  </div>
  <div class="chrome-bot"><span>LEFT</span><span>RIGHT</span></div>
</div>
-->

<!-- SLIDES_HERE -->

</div>

<div id="nav"></div>

<script>
const stage=document.getElementById('stage');
function scale(){const s=Math.min(innerWidth/1920,innerHeight/1080);stage.style.transform=`translate(-50%,-50%) scale(${s})`}
scale();addEventListener('resize',scale);
const slides=[...document.querySelectorAll('.slide')];
const nav=document.getElementById('nav');
let cur=0;
slides.forEach((_,i)=>{const b=document.createElement('button');b.onclick=()=>go(i);nav.appendChild(b)});
function go(n){slides[cur].classList.remove('active');cur=Math.max(0,Math.min(slides.length-1,n));slides[cur].classList.add('active');nav.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on',i===cur))}
addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(cur+1);if(e.key==='ArrowLeft')go(cur-1);if(e.key==='Home')go(0);if(e.key==='End')go(slides.length-1)});
let wA=0,wT;addEventListener('wheel',e=>{wA+=e.deltaY;clearTimeout(wT);wT=setTimeout(()=>wA=0,200);if(Math.abs(wA)>60){go(cur+(wA>0?1:-1));wA=0}},{passive:true});
go(0);
</script>
</body>
</html>
